<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - LPrecast Vendor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-gradient-to-br from-indigo-700 via-indigo-600 to-purple-700 p-4"
  >
    <div class="w-full max-w-md">
      <div
        id="successBanner"
        class="mb-4 hidden rounded-lg bg-green-50 p-4 text-green-700"
      >
        <div class="flex items-start gap-3">
          <i class="fa-solid fa-circle-check mt-1"></i>
          <div>
            <p class="font-semibold">Pendaftaran berhasil!</p>
            <p class="text-sm">
              Silakan cek email Anda untuk verifikasi akun sebelum login.
            </p>
          </div>
        </div>
      </div>

      <div class="rounded-2xl bg-white p-8 shadow-2xl">
        <div class="mb-8 text-center">
          <div
            class="mb-4 inline-flex h-16 w-16 items-center justify-center rounded-full bg-indigo-100"
          >
            <i class="fa-solid fa-building text-3xl text-indigo-700"></i>
          </div>
          <h1 class="text-2xl font-bold text-gray-800">Vendor Portal</h1>
          <p class="mt-1 text-gray-500">Login ke akun vendor Anda</p>
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label
              for="email"
              class="mb-2 block text-sm font-medium text-gray-700"
              >Email</label
            >
            <div class="relative">
              <i
                class="fa-solid fa-envelope absolute top-1/2 left-3 -translate-y-1/2 text-gray-400"
              ></i>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="vendor@perusahaan.com"
                required
                class="w-full rounded-lg border border-gray-300 py-3 pr-4 pl-10 transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          </div>

          <div>
            <label
              for="password"
              class="mb-2 block text-sm font-medium text-gray-700"
              >Password</label
            >
            <div class="relative">
              <i
                class="fa-solid fa-lock absolute top-1/2 left-3 -translate-y-1/2 text-gray-400"
              ></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
                class="w-full rounded-lg border border-gray-300 py-3 pr-4 pl-10 transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          </div>

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center">
              <input
                type="checkbox"
                id="remember"
                name="remember"
                class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
              />
              <span class="ml-2 text-gray-600">Ingat saya</span>
            </label>
            <a href="#" class="text-indigo-600 hover:underline"
              >Lupa password?</a
            >
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="flex w-full items-center justify-center gap-2 rounded-lg bg-indigo-700 py-3 font-semibold text-white shadow-lg transition hover:bg-indigo-800 disabled:opacity-70"
          >
            <span id="btnText">Masuk</span>
            <i id="btnSpinner" class="fa-solid fa-spinner fa-spin hidden"></i>
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-sm text-gray-600">
            Belum punya akun?
            <a
              href="register.html"
              class="font-semibold text-indigo-600 hover:underline"
              >Daftar sekarang</a
            >
          </p>
        </div>
      </div>

      <p class="mt-6 text-center text-sm text-white/80">
        <i class="fa-solid fa-shield-halved mr-1"></i>
        Akses terenkripsi & secure
      </p>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search)
        if (urlParams.get("registered") === "true") {
          const banner = document.getElementById("successBanner")
          banner.classList.remove("hidden")

          window.history.replaceState(
            {},
            document.title,
            window.location.pathname
          )
        }

        const form = document.getElementById("loginForm")
        const submitBtn = document.getElementById("submitBtn")
        const btnText = document.getElementById("btnText")
        const btnSpinner = document.getElementById("btnSpinner")

        form.addEventListener("submit", function (e) {
          e.preventDefault()

          submitBtn.disabled = true
          btnText.textContent = "Memproses..."
          btnSpinner.classList.remove("hidden")

          setTimeout(function () {
            window.location.href = "dashboard.html"
          }, 800)
        })
      })
    </script>
  </body>
</html>
