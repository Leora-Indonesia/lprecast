<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - LPrecast Vendor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-gradient-to-br from-indigo-700 via-indigo-600 to-purple-700 p-4"
  >
    <div class="w-full max-w-lg">
      <div class="rounded-2xl bg-white p-8 shadow-2xl">
        <div class="mb-6 text-center">
          <div
            class="mb-4 inline-flex h-16 w-16 items-center justify-center rounded-full bg-indigo-100"
          >
            <i class="fa-solid fa-user-plus text-3xl text-indigo-700"></i>
          </div>
          <h1 class="text-2xl font-bold text-gray-800">Registrasi Vendor</h1>
          <p class="mt-1 text-gray-500">Bergabung dengan platform LPrecast</p>
        </div>

        <div class="mb-6 rounded-lg border border-amber-200 bg-amber-50 p-4">
          <div class="flex items-start">
            <i class="fa-solid fa-clock mt-0.5 mr-3 text-amber-600"></i>
            <div>
              <p class="text-sm font-medium text-amber-800">Penting</p>
              <p class="mt-1 text-sm text-amber-700">
                Lengkapi 11 data dalam <strong>3×24 jam</strong> atau akun akan
                dinonaktifkan.
              </p>
            </div>
          </div>
        </div>

        <form class="space-y-4">
          <div class="grid gap-4 md:grid-cols-2">
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700"
                >Nama PT *</label
              >
              <input
                type="text"
                placeholder="PT Konstruksi Maju"
                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700"
                >NPWP *</label
              >
              <input
                type="text"
                placeholder="02.XXX.XXX.X-XXX.XXX"
                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          </div>

          <div class="grid gap-4 md:grid-cols-2">
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700"
                >Email Perusahaan *</label
              >
              <input
                type="email"
                placeholder="info@perusahaan.com"
                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700"
                >No. Telepon *</label
              >
              <input
                type="tel"
                placeholder="08XXXXXXXXXX"
                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          </div>

          <div>
            <label class="mb-1 block text-sm font-medium text-gray-700"
              >Alamat *</label
            >
            <textarea
              rows="2"
              placeholder="Jl. Raya Konstruksi No. XX, Kota"
              class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            ></textarea>
          </div>

          <div class="grid gap-4 md:grid-cols-2">
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700"
                >Password *</label
              >
              <input
                type="password"
                placeholder="Min. 8 karakter"
                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700"
                >Konfirmasi Password *</label
              >
              <input
                type="password"
                placeholder="Ulangi password"
                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          </div>

          <div class="flex items-start">
            <input
              type="checkbox"
              class="mt-1 h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
            />
            <span class="ml-2 text-sm text-gray-600">
              Saya menyetujui
              <a href="#" class="text-indigo-600 hover:underline"
                >Syarat & Ketentuan</a
              >
              dan
              <a href="#" class="text-indigo-600 hover:underline"
                >Kebijakan Privasi</a
              >
            </span>
          </div>

          <button
            type="submit"
            class="w-full rounded-lg bg-indigo-700 py-3 font-semibold text-white shadow-lg transition hover:bg-indigo-800"
          >
            Daftar Sekarang
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-sm text-gray-600">
            Sudah punya akun?
            <a
              href="login.html"
              class="font-semibold text-indigo-600 hover:underline"
              >Login di sini</a
            >
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
